<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zap Bui</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="header">
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </div>
    <div class="container">
        <div id="home">
            <div class="content">
                <span>Nice to meet you!</span>

        <div id="skills">
            <h2>Skills</h2>
            <div class="skill-list">

                <div class="skill">

                    <img src="resource/js-brands.svg" class="icon" alt="js" height="120px">

                </div>

                </div>
                <div class="skill">
                    <img src="resource/python-brands.svg" class="icon" alt="python" height="120px">
                    Python
                </div>
                <div class="skill">
                    <img src="resource/git-brands.svg" class="icon" alt="git" height="120px">
                    Git/Github
                </div>
            </div>
        </div>
        <div id="contact">
            <h2>Contact</h2>
            <div class="logo-container">
                <a href="https://github.com/ziap"><img src="resource/github-brands.svg" class="icon" alt="github" height="48px"></a>
